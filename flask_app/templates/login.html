<!DOCTYPE html>
<html>
<head>
    <title>Employee Portal Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 93%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        .error {
            background: #7f1d1d;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            text-align: center;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Employee Portal</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Sign in</button>
        </form>

        <div class="footer">
            Internal system • Authorized users only
        </div>
    </div>

    <!-- {{ payload|safe }} -->
    
</body>
</html>
